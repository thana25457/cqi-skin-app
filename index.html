<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบประเมินความรู้คนไข้ รพ.พริ้นซ์ศรีสะเกษ</title>
    
    <!-- นำเข้า Tailwind CSS สำหรับความสวยงาม -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- นำเข้าไอคอนสวยงามจาก Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- นำเข้า React.js และ Babel ผ่าน cdnjs เพื่อความเสถียร -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>

    <style>
        body { font-family: 'Sarabun', Tahoma, sans-serif; }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 selection:bg-blue-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [role, setRole] = useState(null); 
            const [step, setStep] = useState('welcome'); 
            
            const [patientData, setPatientData] = useState({ name: '', phase: 'pre' });
            const [quizAnswers, setQuizAnswers] = useState({});
            const [skinGrade, setSkinGrade] = useState(null);
            const [showResult, setShowResult] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);

            const [staffAuth, setStaffAuth] = useState({ user: '', pass: '', error: '' });
            const [filterGrade, setFilterGrade] = useState('all');
            
            const [editingId, setEditingId] = useState(null);
            const [editFormData, setEditFormData] = useState({});

            // ---------------- ข้อมูลคำถามอ้างอิงจากแผ่นพับ รพ.พริ้นซ์ ----------------
            const coreQuestions = [
                {
                    id: 1,
                    question: "การอาบน้ำทำความสะอาดผิวหนังบริเวณที่ฉายรังสี ข้อใดปฏิบัติได้ถูกต้องที่สุด?",
                    options: [
                        { text: "อาบน้ำแช่อ่างน้ำร้อน เพื่อกระตุ้นการไหลเวียน", isCorrect: false },
                        { text: "อาบน้ำอุ่น ใช้สบู่อ่อนๆ ไม่มีกลิ่น และซับเบาๆ", isCorrect: true },
                        { text: "ขัดถูผิวแรงๆ เพื่อให้เซลล์ที่ตายแล้วหลุดออก", isCorrect: false },
                        { text: "ห้ามโดนน้ำเด็ดขาดตลอดการรักษา", isCorrect: false }
                    ],
                    explanation: "อ้างอิงข้อ 1: ควรอาบน้ำได้ตามปกติ แต่ควรใช้น้ำอุ่นและสบู่อ่อนๆ ที่ไม่มีกลิ่น ภายหลังอาบน้ำเสร็จให้ซับเบาๆ ด้วยผ้าขนหนูนุ่มๆ ไม่ควรขัดถูแรงๆ"
                },
                {
                    id: 2,
                    question: "หากมีอาการผิวแห้งบริเวณที่ฉายรังสี ควรปฏิบัติตามข้อใด?",
                    options: [
                        { text: "ทาแป้งเด็กเพื่อลดความอับชื้น", isCorrect: false },
                        { text: "ทาครีมบำรุงผิวที่แพทย์หรือพยาบาลแนะนำเท่านั้น", isCorrect: true },
                        { text: "ซื้อยาทาแก้แพ้ตามร้านขายยามาทาเอง", isCorrect: false },
                        { text: "ใช้น้ำหอมหรือโลชั่นทั่วไปเพื่อเพิ่มความชุ่มชื้น", isCorrect: false }
                    ],
                    explanation: "อ้างอิงข้อ 1: หากผิวแห้ง ควรใช้ครีมบำรุงที่แพทย์หรือพยาบาลแนะนำเท่านั้น ห้ามใช้ครีม แป้ง น้ำหอม หรือโลชั่นที่แพทย์ไม่ได้สั่ง"
                }
            ];

            const phaseQuestions = {
                pre: [
                    { id: 101, question: "อาหารประเภทใดที่ผู้ป่วยฉายรังสีควร 'หลีกเลี่ยง'?", options: [ { text: "อาหารอ่อนย่อยง่าย เช่น โจ๊ก ข้าวต้ม ปลา", isCorrect: false }, { text: "อาหารรสจัด เผ็ด มัน เค็ม หรือหวานจัด", isCorrect: true }, { text: "อาหารที่ปรุงสุกใหม่ๆ", isCorrect: false }, { text: "น้ำเปล่าวันละ 6-8 แก้ว", isCorrect: false } ], explanation: "อ้างอิงข้อ 2: ควรหลีกเลี่ยงอาหารรสจัด เผ็ด มัน เค็ม หรือหวานจัด เพราะอาจกระตุ้นให้มีอาการแสบร้อน คลื่นไส้ หรือท้องเสียได้" },
                    { id: 102, question: "การสวมใส่เสื้อผ้าในช่วงที่รับการฉายรังสี ควรเป็นลักษณะใด?", options: [ { text: "เสื้อผ้าเนื้อหนา รัดรูป เพื่อความกระชับ", isCorrect: false }, { text: "เสื้อผ้าหลวม ระบายอากาศได้ดี เช่น ผ้าฝ้าย", isCorrect: true }, { text: "เสื้อผ้าแบบใดก็ได้ ไม่มีผลต่อการรักษา", isCorrect: false }, { text: "เสื้อแจ็คเก็ตกันหนาวตลอดเวลา", isCorrect: false } ], explanation: "อ้างอิงข้อ 1: ควรสร้างเสื้อผ้าที่หลวม ระบายอากาศได้ดี เช่น ผ้าฝ้าย เพื่อลดการเสียดสีบริเวณที่ฉายรังสี" },
                    { id: 103, question: "สำหรับผู้ป่วยหญิง ข้อควรปฏิบัติเกี่ยวกับการตั้งครรภ์ระหว่างฉายรังสีคือข้อใด?", options: [ { text: "สามารถตั้งครรภ์ได้ตามปกติ", isCorrect: false }, { text: "ควรหลีกเลี่ยงการตั้งครรภ์ และหากตั้งครรภ์ต้องรีบแจ้งแพทย์ทันที", isCorrect: true }, { text: "คุมกำเนิดเฉพาะเดือนแรกของการรักษาเท่านั้น", isCorrect: false }, { text: "ไม่จำเป็นต้องคุมกำเนิดหากอายุมากแล้ว", isCorrect: false } ], explanation: "อ้างอิงข้อ 6: ควรหลีกเลี่ยงการตั้งครรภ์ เนื่องจากรังสีอาจส่งผลกระทบต่อทารกในครรภ์ได้ หากตั้งครรภ์ต้องรีบแจ้งแพทย์ทันที" }
                ],
                week1: [
                    { id: 201, question: "ข้อควรระวังเกี่ยวกับ 'เส้นหรือเครื่องหมาย' ที่แพทย์วาดไว้บนตัวคือข้อใด?", options: [ { text: "สามารถใช้สบู่ขัดออกได้หากดูไม่สวยงาม", isCorrect: false }, { text: "ใช้ปากกาเมจิกวาดทับเองได้เมื่อเส้นเริ่มจาง", isCorrect: false }, { text: "อย่าลบเส้นที่แพทย์ทำเครื่องหมายบนผิวเด็ดขาด", isCorrect: true }, { text: "ติดพลาสเตอร์ทับเส้นไว้กันน้ำเวลาอาบน้ำ", isCorrect: false } ], explanation: "อ้างอิงข้อ 1 (สิ่งที่ควรหลีกเลี่ยง): อย่าลบเส้นที่แพทย์ทำเครื่องหมายบนผิว เพราะใช้เพื่อจัดตำแหน่งการฉายรังสีให้แม่นยำ" },
                    { id: 202, question: "หากจำเป็นต้องออกแดด ควรปฏิบัติตัวอย่างไร?", options: [ { text: "ทาครีมกันแดดหนาๆ บริเวณที่ฉายรังสี", isCorrect: false }, { text: "ควรใช้ร่ม หมวก เสื้อคลุมปิดบัง ไม่ให้แสงแดดโดนผิวโดยตรง", isCorrect: true }, { text: "สามารถตากแดดได้ตามปกติ เพื่อรับวิตามินดี", isCorrect: false }, { text: "อาบแดดได้แต่ไม่ควรเกิน 1 ชั่วโมง", isCorrect: false } ], explanation: "อ้างอิงข้อ 1: หากต้องออกแดด ควรใช้ร่ม หมวก เสื้อคลุมปิดบัง ไม่ควรให้แสงแดดโดนตรงบริเวณที่ฉายรังสี" },
                    { id: 203, question: "หากมีอาการคลื่นไส้เบื่ออาหาร ควรปรับพฤติกรรมการกินอย่างไร?", options: [ { text: "งดอาหารไปเลยจนกว่าจะหิว", isCorrect: false }, { text: "กินทีละน้อย แต่บ่อยครั้งขึ้น", isCorrect: true }, { text: "บังคับตัวเองให้กินมื้อใหญ่ๆ ให้หมดในครั้งเดียว", isCorrect: false }, { text: "กินเฉพาะขนมหวานเพื่อเพิ่มพลังงาน", isCorrect: false } ], explanation: "อ้างอิงข้อ 2: ควรกินทีละน้อย แต่บ่อยครั้ง หากมีอาการคลื่นไส้ ไม่จำเป็นต้องฝืนกินมื้อใหญ่ ค่อยๆ ทานทีละน้อยแต่บ่อยจะดีกว่า" }
                ],
                week3: [
                    { id: 301, question: "สิ่งที่ 'ห้ามทำเด็ดขาด' บนผิวหนังบริเวณที่ฉายรังสีคือข้อใด?", options: [ { text: "ห้ามซับผิวเบาๆ ด้วยผ้าขนหนูนุ่มๆ", isCorrect: false }, { text: "ห้ามเกา ขัด ถู หรือแปะพลาสเตอร์บนผิว", isCorrect: true }, { text: "ห้ามสวมเสื้อผ้าหลวมๆ", isCorrect: false }, { text: "ห้ามอาบน้ำด้วยสบู่อ่อนๆ", isCorrect: false } ], explanation: "อ้างอิงข้อ 1 (สิ่งที่ควรหลีกเลี่ยง): ห้ามเกา ขัด ถู หรือแปะพลาสเตอร์บนผิวที่ฉายรังสีเด็ดขาด เพราะจะทำให้ผิวหนังเกิดการบาดเจ็บและอักเสบ" },
                    { id: 302, question: "หากมีขนขึ้นบริเวณที่ฉายรังสีและต้องการกำจัด ควรทำอย่างไร?", options: [ { text: "ใช้มีดโกนหนวดโกนออกได้เลย", isCorrect: false }, { text: "ห้ามโกนด้วยมีดโกน แต่สามารถใช้กรรไกรเล็มได้ถ้าจำเป็น", isCorrect: true }, { text: "ใช้ครีมกำจัดขนหรือแว็กซ์ดึงออก", isCorrect: false }, { text: "ถอนออกทีละเส้น", isCorrect: false } ], explanation: "อ้างอิงข้อ 1: ห้ามโกนขนด้วยมีดโกนบริเวณที่ฉายรังสี (สามารถใช้กรรไกรเล็มได้ถำจำเป็น)" },
                    { id: 303, question: "หากมีอาการผิดปกติ เช่น เจ็บปวด อ่อนเพลีย หรือกลืนลำบาก ควรทำอย่างไร?", options: [ { text: "อดทนไว้เพราะเป็นเรื่องปกติ", isCorrect: false }, { text: "ซื้อยาแก้ปวดกินเอง", isCorrect: false }, { text: "มาตามนัดและแจ้งอาการให้แพทย์หรือพยาบาลทราบทันที", isCorrect: true }, { text: "หยุดพักการรักษาไปก่อนจนกว่าจะดีขึ้น", isCorrect: false } ], explanation: "อ้างอิงข้อ 4: หากมีอาการผิดปกติ เช่น เจ็บปวด อ่อนเพลีย เบื่ออาหาร หรือกลืนลำบาก ควรแจ้งแพทย์ทันที" }
                ],
                post: [
                    { id: 401, question: "การติดตามภาวะทั่วไปหลังการรักษา ข้อใดกล่าวถูกต้อง?", options: [ { text: "มาตรวจเลือดและพบแพทย์ตามที่นัดอย่างสม่ำเสมอ", isCorrect: true }, { text: "ไม่ต้องมาพบแพทย์แล้วหากไม่มีอาการผิดปกติ", isCorrect: false }, { text: "มาตรวจเลือดปีละ 1 ครั้งก็เพียงพอ", isCorrect: false }, { text: "สามารถเปลี่ยนไปรักษากับคลินิกทั่วไปได้เลย", isCorrect: false } ], explanation: "อ้างอิงข้อ 4: ต้องมาฉายรังสีและตรวจตามเวลานัดเสมอ รวมถึงการตรวจเลือด (เช่น CBC) ตามนัดเพื่อดูสุขภาพโดยรวม" },
                    { id: 402, question: "การพักผ่อนและการทำกิจกรรมระหว่างและหลังจบการรักษา ควรเป็นอย่างไร?", options: [ { text: "นอนหลับวันละ 4-5 ชั่วโมงก็เพียงพอ", isCorrect: false }, { text: "นอนหลับวันละ 6-8 ชั่วโมง และพยายามทำกิจกรรมเบาๆ ยืดเหยียด", isCorrect: true }, { text: "งดการเคลื่อนไหวร่างกายทุกชนิด", isCorrect: false }, { text: "ออกกำลังกายอย่างหนักทันทีเพื่อให้ร่างกายแข็งแรง", isCorrect: false } ], explanation: "อ้างอิงข้อ 2: ควรนอนหลับให้ได้วันละ 6-8 ชั่วโมง และพยายามทำกิจกรรมเบาๆ เช่น เดินช้าๆ ยืดเหยียด เพื่อให้ร่างกายยังแข็งแรง" },
                    { id: 403, question: "หากรู้สึกเครียด วิตกกังวล หรือซึมเศร้า ควรทำอย่างไร?", options: [ { text: "เก็บความรู้สึกไว้คนเดียว", isCorrect: false }, { text: "หยุดรับประทานยาที่แพทย์สั่ง", isCorrect: false }, { text: "แยกตัวออกจากสังคม", isCorrect: false }, { text: "เข้ารับคำปรึกษาทางจิตใจหรือพูดคุยกับคนใกล้ชิด", isCorrect: true } ], explanation: "อ้างอิงข้อ 5: พยายามผ่อนคลาย จัดกิจกรรมที่ชอบ หากรู้สึกเครียด วิตกกังวล หรือซึมเศร้า เข้ารับคำปรึกษาทางจิตใจหรือพูดคุยกับคนใกล้ชิดได้" }
                ]
            };

            const activeQuestions = [...coreQuestions, ...(phaseQuestions[patientData.phase] || [])];

            const [dbData, setDbData] = useState([
                { id: 1, name: 'สมศรี ใจดี', score: 100, grade: 1, phase: 'สัปดาห์ที่ 3 - 4', timestamp: '17/4/2026, 09:15' },
                { id: 2, name: 'มาลี รักสวย', score: 40, grade: 3, phase: 'สัปดาห์ที่ 3 - 4', timestamp: '17/4/2026, 10:30' },
                { id: 3, name: 'วันเพ็ญ เด่นดวง', score: 80, grade: 0, phase: 'ก่อนเริ่มฉายแสง', timestamp: '18/4/2026, 08:20' },
            ]);

            const currentScore = Object.keys(quizAnswers).reduce((score, qId) => {
                const q = activeQuestions.find(q => q.id === parseInt(qId));
                if (q && q.options[quizAnswers[qId]].isCorrect) return score + 1;
                return score;
            }, 0);
            const scorePercentage = Math.round((currentScore / activeQuestions.length) * 100);

            // ---------------- Handlers ----------------
            const handleStaffLogin = (e) => {
                e.preventDefault();
                if (staffAuth.user === 'admin' && staffAuth.pass === '1234') {
                    setRole('staff');
                    setStep('dashboard');
                    setStaffAuth({ user: '', pass: '', error: '' });
                } else {
                    setStaffAuth({ ...staffAuth, error: 'รหัสผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง' });
                }
            };

            const submitPatientAssessment = async () => {
                setIsSubmitting(true);
                const phaseLabels = { 'pre': 'ก่อนเริ่มฉายแสง', 'week1': 'สัปดาห์ที่ 1 - 2', 'week3': 'สัปดาห์ที่ 3 - 4', 'post': 'หลังจบคอร์ส' };
                const timestampStr = new Date().toLocaleString('th-TH', { 
                        day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' 
                });

                const newRecord = {
                    id: Date.now(),
                    name: patientData.name,
                    score: scorePercentage,
                    grade: skinGrade,
                    phase: phaseLabels[patientData.phase],
                    timestamp: timestampStr
                };

                // ---- ส่วนที่ส่งข้อมูลไป Google Sheet ----
                const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwqKkh4Nbw6UyStPbi6Z_IUiGVSpZKGNm572uK-y1q_sP5iWt9vpPafmETLlIzJ4Wpf/exec"; 

                try {
                    if(GOOGLE_SCRIPT_URL.startsWith("http")) {
                        await fetch(GOOGLE_SCRIPT_URL, {
                            method: "POST",
                            headers: {
                                "Content-Type": "text/plain;charset=utf-8",
                            },
                            body: JSON.stringify(newRecord)
                        });
                    }
                } catch (error) {
                    console.error("Error sending to Google Sheets", error);
                }
                
                setDbData([newRecord, ...dbData]);
                setIsSubmitting(false);
                setShowResult(true);
                setStep('result');
            };

            const resetApp = () => {
                setRole(null);
                setStep('welcome');
                setPatientData({ name: '', phase: 'pre' });
                setQuizAnswers({});
                setSkinGrade(null);
                setShowResult(false);
                setIsSubmitting(false);
            };

            const handleDeleteRecord = (id) => {
                if (window.confirm("คุณแน่ใจหรือไม่ที่จะลบข้อมูลการประเมินนี้?")) {
                    setDbData(dbData.filter(d => d.id !== id));
                }
            };

            const handleEditRecord = (record) => {
                setEditingId(record.id);
                setEditFormData({ ...record });
            };

            const handleSaveEdit = () => {
                setDbData(dbData.map(d => (d.id === editingId ? editFormData : d)));
                setEditingId(null);
            };

            const handleCancelEdit = () => {
                setEditingId(null);
            };

            // ---------------- UI Render Functions ----------------
            const renderRoleSelection = () => (
                <div className="flex flex-col items-center justify-center min-h-screen p-6 bg-gradient-to-br from-blue-50 to-indigo-50 animate-fadeIn">
                    <div className="text-center mb-10 w-full max-w-lg">
                        <div className="bg-white w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 shadow-md border-4 border-blue-100">
                            <i className="ph ph-hospital text-blue-600 text-4xl"></i>
                        </div>
                        <h1 className="text-2xl font-bold text-blue-900 mb-3 leading-tight">
                            ระบบประเมินความรู้คนไข้<br/>เรื่องการดูแลผิวหนังบริเวณที่ฉายรังสี
                        </h1>
                        <p className="text-slate-600 font-medium">โรงพยาบาลพริ้นซ์ศรีสะเกษ</p>
                    </div>

                    <div className="w-full max-w-md space-y-4">
                        <button onClick={() => { setRole('patient'); setStep('patient_login'); }} className="w-full bg-white p-6 rounded-2xl shadow-sm hover:shadow-md border border-blue-100 flex items-center gap-4 transition-all group">
                            <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center shrink-0 group-hover:scale-105 transition-transform">
                                <i className="ph ph-user text-3xl"></i>
                            </div>
                            <div className="text-left">
                                <h2 className="text-xl font-bold text-slate-800">สำหรับผู้ป่วย</h2>
                                <p className="text-slate-500 text-sm mt-1">ทำแบบทดสอบและประเมินแผล</p>
                            </div>
                            <i className="ph ph-caret-right ml-auto text-slate-300 group-hover:text-blue-500 text-xl"></i>
                        </button>

                        <button onClick={() => { setStep('staff_login'); }} className="w-full bg-white p-6 rounded-2xl shadow-sm hover:shadow-md border border-teal-100 flex items-center gap-4 transition-all group">
                            <div className="w-16 h-16 bg-teal-100 text-teal-600 rounded-full flex items-center justify-center shrink-0 group-hover:scale-105 transition-transform">
                                <i className="ph ph-lock text-3xl"></i>
                            </div>
                            <div className="text-left">
                                <h2 className="text-xl font-bold text-slate-800">สำหรับเจ้าหน้าที่</h2>
                                <p className="text-slate-500 text-sm mt-1">เข้าสู่ระบบ Dashboard (CQI)</p>
                            </div>
                            <i className="ph ph-caret-right ml-auto text-slate-300 group-hover:text-teal-500 text-xl"></i>
                        </button>
                    </div>
                </div>
            );

            const renderStaffLogin = () => (
                <div className="flex flex-col items-center justify-center min-h-screen p-6 bg-slate-50 animate-fadeIn">
                    <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md border border-slate-100">
                        <div className="w-16 h-16 bg-teal-50 text-teal-600 rounded-2xl flex items-center justify-center mb-6">
                            <i className="ph ph-lock text-3xl"></i>
                        </div>
                        <h2 className="text-2xl font-bold text-slate-800 mb-2">เข้าสู่ระบบเจ้าหน้าที่</h2>
                        <p className="text-slate-500 mb-8 text-sm">กรุณากรอกรหัสผ่านเพื่อเข้าดู Dashboard</p>
                        
                        <form onSubmit={handleStaffLogin} className="space-y-5">
                            {staffAuth.error && (
                                <div className="p-3 bg-red-50 text-red-600 text-sm rounded-lg border border-red-100 flex items-center gap-2">
                                    <i className="ph ph-warning"></i> {staffAuth.error}
                                </div>
                            )}
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1.5">ชื่อผู้ใช้งาน (Username)</label>
                                <input type="text" className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500 focus:bg-white outline-none transition-all" value={staffAuth.user} onChange={(e) => setStaffAuth({...staffAuth, user: e.target.value})} required />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1.5">รหัสผ่าน (Password)</label>
                                <input type="password" className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500 focus:bg-white outline-none transition-all" value={staffAuth.pass} onChange={(e) => setStaffAuth({...staffAuth, pass: e.target.value})} required />
                            </div>
                            <button type="submit" className="w-full mt-6 bg-teal-600 hover:bg-teal-700 text-white font-bold py-4 rounded-xl transition-colors shadow-md shadow-teal-200">เข้าสู่ระบบ</button>
                        </form>
                        <button onClick={resetApp} className="w-full mt-6 text-slate-500 hover:text-slate-800 font-medium text-sm">กลับหน้าหลัก</button>
                    </div>
                </div>
            );

            const renderPatientLogin = () => (
                <div className="flex flex-col items-center justify-center min-h-[calc(100vh-70px)] p-6 animate-fadeIn bg-slate-50">
                    <div className="bg-white p-8 rounded-3xl shadow-lg w-full max-w-md border border-slate-100">
                        <div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mb-6">
                            <i className="ph ph-user text-3xl"></i>
                        </div>
                        <h2 className="text-2xl font-bold text-slate-800 mb-2">ลงทะเบียนประเมิน</h2>
                        <p className="text-slate-500 mb-8 text-sm">กรุณาระบุข้อมูลเพื่อเริ่มทำแบบประเมิน</p>
                        
                        <div className="space-y-5">
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1.5">ชื่อ - นามสกุล</label>
                                <input type="text" className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all" placeholder="ระบุชื่อและนามสกุล" value={patientData.name} onChange={(e) => setPatientData({...patientData, name: e.target.value})} />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1.5">ระยะการประเมิน (สัปดาห์ที่ฉายแสง)</label>
                                <select className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all" value={patientData.phase} onChange={(e) => { setPatientData({...patientData, phase: e.target.value}); setQuizAnswers({}); }}>
                                    <option value="pre">ก่อนเริ่มฉายแสง (Pre-test)</option>
                                    <option value="week1">สัปดาห์ที่ 1 - 2</option>
                                    <option value="week3">สัปดาห์ที่ 3 - 4</option>
                                    <option value="post">หลังจบคอร์ส (Post-test)</option>
                                </select>
                            </div>
                            <button onClick={() => { setStep('quiz'); setQuizAnswers({}); }} disabled={!patientData.name.trim()} className="w-full mt-6 bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 text-white font-bold py-4 rounded-xl transition-all shadow-md shadow-blue-200 disabled:shadow-none">เริ่มทำแบบประเมิน</button>
                        </div>
                    </div>
                </div>
            );

            const renderQuizScreen = () => (
                <div className="max-w-md mx-auto p-5 animate-fadeIn pb-28">
                    <div className="mb-8 mt-2">
                        <div className="flex items-center justify-between mb-4">
                            <div className="flex items-center gap-2 text-blue-700">
                                <i className="ph ph-book-open text-2xl"></i>
                                <h2 className="text-xl font-bold">ประเมินความรู้</h2>
                            </div>
                            <span className="text-sm font-bold bg-blue-100 text-blue-700 px-3 py-1 rounded-full">{Object.keys(quizAnswers).length} / {activeQuestions.length}</span>
                        </div>
                        <div className="w-full bg-slate-200 h-2.5 rounded-full overflow-hidden">
                            <div className="bg-blue-600 h-full transition-all duration-300 ease-out" style={{ width: `${(Object.keys(quizAnswers).length / activeQuestions.length) * 100}%` }}></div>
                        </div>
                    </div>

                    <div className="space-y-6">
                        {activeQuestions.map((q, qIndex) => (
                            <div key={q.id} className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                                <h3 className="font-bold text-slate-800 mb-5 leading-relaxed text-lg">
                                    <span className="text-blue-500 mr-2">{qIndex + 1}.</span>{q.question}
                                </h3>
                                <div className="space-y-3">
                                    {q.options.map((opt, oIndex) => (
                                        <button key={oIndex} onClick={() => setQuizAnswers({...quizAnswers, [q.id]: oIndex})} className={`w-full text-left p-4 rounded-xl border-2 transition-all duration-200 ${quizAnswers[q.id] === oIndex ? 'bg-blue-50 border-blue-500 text-blue-800 font-bold shadow-sm' : 'border-slate-100 bg-slate-50 text-slate-600 hover:border-blue-200 hover:bg-white'}`}>
                                            {opt.text}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>

                    {Object.keys(quizAnswers).length === activeQuestions.length && (
                        <div className="fixed bottom-0 left-0 w-full p-4 bg-white/90 backdrop-blur-sm border-t border-slate-200 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
                            <button onClick={() => setStep('symptom')} className="w-full max-w-md mx-auto block bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-blue-200 transition-colors">
                                ถัดไป: ประเมินผิวหนัง <i className="ph ph-arrow-right text-xl"></i>
                            </button>
                        </div>
                    )}
                </div>
            );

            const renderSymptomScreen = () => {
                const skinOptions = [
                    { grade: 0, text: 'ผิวปกติ สีผิวไม่เปลี่ยนแปลง', color: 'green', image: 'images/rtog0.png' },
                    { grade: 1, text: 'ผิวแดงจางๆ หรือแห้งลอกเป็นขุย', color: 'yellow', image: 'images/rtog1.png' },
                    { grade: 2, text: 'ผิวแดงจัด หรือถลอกแฉะเป็นหย่อม', color: 'orange', image: 'images/rtog2.png' },
                    { grade: 3, text: 'แผลเปิดลอกแฉะบริเวณกว้าง เจ็บมาก', color: 'red', image: 'images/rtog3.png' },
                    { grade: 4, text: 'แผลลึก มีเลือดออกหรือเนื้อตาย', color: 'purple', image: 'images/rtog4.png' }
                ];

                return (
                    <div className="max-w-md mx-auto p-5 animate-fadeIn pb-28">
                        <div className="mb-6 mt-2">
                            <div className="flex items-center gap-2 mb-2 text-orange-600">
                                <i className="ph ph-pulse text-2xl"></i>
                                <h2 className="text-xl font-bold">ประเมินผลข้างเคียง</h2>
                            </div>
                            <p className="text-slate-600 text-sm">กรุณาเลือกภาพที่ตรงกับลักษณะผิวหนังบริเวณที่ฉายแสงของท่านในวันนี้มากที่สุด</p>
                        </div>

                        <div className="grid grid-cols-1 gap-4">
                            {skinOptions.map((item) => (
                                <div key={item.grade} onClick={() => setSkinGrade(item.grade)} className={`cursor-pointer rounded-2xl border-2 p-4 flex items-center gap-4 bg-white transition-all duration-200 ${skinGrade === item.grade ? `border-${item.color}-500 bg-${item.color}-50 shadow-md transform scale-[1.02]` : 'border-slate-100 hover:border-slate-300'}`}>
                                    
                                    <div className="w-24 h-24 shrink-0 bg-slate-100 rounded-xl overflow-hidden border border-slate-200 shadow-sm relative">
                                        <img 
                                            src={item.image} 
                                            alt={`RTOG Grade ${item.grade}`} 
                                            className="w-full h-full object-cover absolute top-0 left-0 z-10"
                                            onError={(e) => { e.target.style.display = 'none'; }}
                                        />
                                        <div className="w-full h-full flex flex-col items-center justify-center text-[10px] text-slate-400 absolute top-0 left-0">
                                            <span className="font-bold text-slate-500 mb-1">Grade {item.grade}</span>
                                            (ใส่รูปในโฟลเดอร์)
                                        </div>
                                    </div>
                                    
                                    <div className="flex-1">
                                        <span className={`block font-bold text-lg mb-1 ${skinGrade === item.grade ? `text-${item.color}-700` : 'text-slate-800'}`}>ระดับที่ {item.grade}</span>
                                        <span className="text-sm text-slate-600 leading-snug block">{item.text}</span>
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="fixed bottom-0 left-0 w-full p-4 bg-white/90 backdrop-blur-sm border-t border-slate-200 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
                            <button onClick={submitPatientAssessment} disabled={skinGrade === null || isSubmitting} className="w-full max-w-md mx-auto block bg-green-600 hover:bg-green-700 disabled:bg-slate-300 text-white font-bold py-4 rounded-xl disabled:shadow-none shadow-lg shadow-green-200 transition-all flex items-center justify-center gap-2">
                                {isSubmitting ? (
                                    <span>กำลังบันทึกข้อมูล...</span>
                                ) : (
                                    <><i className="ph-fill ph-check-circle text-xl"></i> ยืนยันการส่งผลประเมิน</>
                                )}
                            </button>
                        </div>
                    </div>
                );
            };

            const renderPatientResultScreen = () => (
                <div className="max-w-md mx-auto p-5 animate-fadeIn pb-20">
                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-center mb-8 mt-2">
                        <div className="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i className="ph-fill ph-check-circle text-4xl"></i>
                        </div>
                        <h2 className="text-2xl font-bold text-slate-800 mb-1">บันทึกข้อมูลสำเร็จ</h2>
                        <p className="text-slate-500 text-sm mb-6">วันที่ประเมิน: {new Date().toLocaleDateString('th-TH')}</p>
                        
                        <div className="inline-flex items-center justify-center gap-2 bg-blue-50 border border-blue-100 text-blue-800 px-6 py-3 rounded-2xl font-bold text-xl mb-4 w-full">
                            คะแนนของคุณ: {currentScore}/{activeQuestions.length} ({scorePercentage}%)
                        </div>
                        
                        {skinGrade >= 2 && (
                            <div className="mt-4 p-5 bg-red-50 border border-red-200 rounded-2xl flex items-start gap-3 text-left shadow-sm">
                                <i className="ph ph-warning shrink-0 text-red-600 mt-1 text-2xl"></i>
                                <div>
                                    <p className="font-bold text-red-800 text-lg">พบแผลอักเสบระดับ {skinGrade}</p>
                                    <p className="text-sm mt-1.5 text-red-700 leading-relaxed">แผลเริ่มมีการอักเสบหรือถลอก กรุณาแจ้งพยาบาลรังสีรักษาหน้าห้องในวันนี้ เพื่อให้แพทย์ประเมินซ้ำและรับยาทาแผลเฉพาะทาง</p>
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="flex items-center gap-2 mb-4 px-2">
                        <i className="ph ph-book-open text-slate-400 text-xl"></i>
                        <h3 className="font-bold text-slate-700 text-lg">ทบทวนความรู้ของคุณ</h3>
                    </div>
                    
                    <div className="space-y-4">
                        {activeQuestions.map((q) => {
                            const isCorrect = q.options[quizAnswers[q.id]].isCorrect;
                            return (
                                <div key={q.id} className={`p-5 rounded-2xl border-2 ${isCorrect ? 'bg-green-50/50 border-green-200' : 'bg-red-50/50 border-red-200'}`}>
                                    <div className="flex gap-3 items-start mb-3">
                                        {isCorrect ? <i className="ph-fill ph-check-circle text-green-500 shrink-0 mt-0.5 text-2xl"></i> : <i className="ph-fill ph-x-circle text-red-500 shrink-0 mt-0.5 text-2xl"></i>}
                                        <p className="font-bold text-slate-800 leading-relaxed">{q.question}</p>
                                    </div>
                                    <div className="ml-9 bg-white p-4 rounded-xl border border-slate-100 text-sm text-slate-600 shadow-sm leading-relaxed">
                                        <span className="font-bold text-blue-600 block mb-1">คำอธิบาย: </span>{q.explanation}
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    <button onClick={resetApp} className="w-full mt-10 bg-slate-800 text-white font-bold py-4 rounded-xl shadow-lg shadow-slate-200 hover:bg-slate-900 transition-colors">
                        กลับหน้าหลัก / เสร็จสิ้น
                    </button>
                </div>
            );

            const renderStaffDashboard = () => {
                const filteredDatabase = filterGrade === 'all' ? dbData : dbData.filter(d => d.grade.toString() === filterGrade);

                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col">
                        <header className="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-20 flex flex-col md:flex-row md:justify-between md:items-center gap-4 shadow-sm">
                            <div>
                                <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><i className="ph ph-chart-bar text-teal-600"></i> CQI Dashboard</h1>
                                <p className="text-slate-500 text-sm mt-1">รพ.พริ้นซ์ศรีสะเกษ - ระบบประเมินความรู้และผลข้างเคียงผิวหนัง</p>
                            </div>
                            <button onClick={resetApp} className="px-5 py-2.5 bg-slate-100 text-slate-700 rounded-xl hover:bg-slate-200 font-medium transition-colors w-full md:w-auto text-center border border-slate-200">ออกจากระบบ</button>
                        </header>

                        <div className="flex-1 p-6 overflow-y-auto w-full max-w-7xl mx-auto space-y-6">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex items-center gap-5">
                                    <div className="w-14 h-14 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center shrink-0"><i className="ph ph-users text-3xl"></i></div>
                                    <div><p className="text-slate-500 font-medium text-sm mb-1">จำนวนประเมินทั้งหมด</p><p className="text-3xl font-bold text-slate-800">{dbData.length} <span className="text-base font-normal text-slate-500">ครั้ง</span></p></div>
                                </div>
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex items-center gap-5">
                                    <div className="w-14 h-14 rounded-full bg-green-50 text-green-600 flex items-center justify-center shrink-0"><i className="ph ph-shield-check text-3xl"></i></div>
                                    <div><p className="text-slate-500 font-medium text-sm mb-1">คะแนนความรู้เฉลี่ยรวม</p><p className="text-3xl font-bold text-slate-800">{dbData.length ? Math.round(dbData.reduce((sum, d) => sum + d.score, 0) / dbData.length) : 0}%</p></div>
                                </div>
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex items-center gap-5">
                                    <div className="w-14 h-14 rounded-full bg-orange-50 text-orange-600 flex items-center justify-center shrink-0"><i className="ph ph-warning text-3xl"></i></div>
                                    <div><p className="text-slate-500 font-medium text-sm mb-1">แผลเสี่ยงสูง (Grade ≥ 2)</p><p className="text-3xl font-bold text-slate-800">{dbData.filter(d => d.grade >= 2).length} <span className="text-base font-normal text-slate-500">เคส</span></p></div>
                                </div>
                            </div>

                            <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden flex flex-col">
                                <div className="p-6 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-slate-50/50">
                                    <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2"><i className="ph ph-pulse text-blue-500 text-xl"></i> ข้อมูลการประเมินรายบุคคล</h2>
                                    <div className="flex items-center gap-2 w-full sm:w-auto bg-white p-1 rounded-xl border border-slate-200">
                                        <i className="ph ph-funnel text-slate-400 ml-2"></i>
                                        <select className="bg-transparent text-sm font-medium text-slate-700 py-2 pr-4 outline-none w-full sm:w-auto cursor-pointer" value={filterGrade} onChange={(e) => setFilterGrade(e.target.value)}>
                                            <option value="all">แสดงทุกระดับแผล (All Grades)</option>
                                            <option value="0">เฉพาะ Grade 0 (ปกติ)</option>
                                            <option value="1">เฉพาะ Grade 1 (แดงจาง/ขุย)</option>
                                            <option value="2">เฉพาะ Grade 2 (แดงจัด/แฉะหย่อม)</option>
                                            <option value="3">เฉพาะ Grade 3 (แผลเปิดกว้าง)</option>
                                            <option value="4">เฉพาะ Grade 4 (แผลลึก/เนื้อตาย)</option>
                                        </select>
                                    </div>
                                </div>

                                <div className="overflow-x-auto w-full">
                                    <table className="w-full text-left border-collapse min-w-[900px]">
                                        <thead>
                                            <tr className="bg-slate-50 text-slate-500 text-sm border-b border-slate-200">
                                                <th className="p-4 pl-6 font-medium whitespace-nowrap">วันที่ / เวลา</th>
                                                <th className="p-4 font-medium whitespace-nowrap">ชื่อ - นามสกุล</th>
                                                <th className="p-4 font-medium whitespace-nowrap">ระยะเวลาฉายแสง</th>
                                                <th className="p-4 font-medium text-center whitespace-nowrap">คะแนน (%)</th>
                                                <th className="p-4 font-medium text-center whitespace-nowrap">ระดับแผล (RTOG)</th>
                                                <th className="p-4 pr-6 font-medium text-center whitespace-nowrap">จัดการ</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {filteredDatabase.length > 0 ? filteredDatabase.map(row => (
                                                editingId === row.id ? (
                                                    <tr key={row.id} className="bg-blue-50/50 border-b border-blue-100">
                                                        <td className="p-3 pl-6 text-sm text-slate-500">{row.timestamp}</td>
                                                        <td className="p-3">
                                                            <input type="text" value={editFormData.name} onChange={(e) => setEditFormData({...editFormData, name: e.target.value})} className="w-full p-2 border border-blue-300 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-blue-500" />
                                                        </td>
                                                        <td className="p-3">
                                                            <select value={editFormData.phase} onChange={(e) => setEditFormData({...editFormData, phase: e.target.value})} className="w-full p-2 border border-blue-300 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-blue-500">
                                                                <option value="ก่อนเริ่มฉายแสง">ก่อนเริ่มฉายแสง</option>
                                                                <option value="สัปดาห์ที่ 1 - 2">สัปดาห์ที่ 1 - 2</option>
                                                                <option value="สัปดาห์ที่ 3 - 4">สัปดาห์ที่ 3 - 4</option>
                                                                <option value="หลังจบคอร์ส">หลังจบคอร์ส</option>
                                                            </select>
                                                        </td>
                                                        <td className="p-3">
                                                            <input type="number" min="0" max="100" value={editFormData.score} onChange={(e) => setEditFormData({...editFormData, score: Number(e.target.value)})} className="w-20 mx-auto block p-2 border border-blue-300 rounded-lg text-sm text-center focus:outline-none focus:ring-1 focus:ring-blue-500" />
                                                        </td>
                                                        <td className="p-3">
                                                            <select value={editFormData.grade} onChange={(e) => setEditFormData({...editFormData, grade: Number(e.target.value)})} className="w-24 mx-auto block p-2 border border-blue-300 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-blue-500">
                                                                <option value={0}>Grade 0</option>
                                                                <option value={1}>Grade 1</option>
                                                                <option value={2}>Grade 2</option>
                                                                <option value={3}>Grade 3</option>
                                                                <option value={4}>Grade 4</option>
                                                            </select>
                                                        </td>
                                                        <td className="p-3 pr-6 text-center">
                                                            <div className="flex items-center justify-center gap-2">
                                                                <button onClick={handleSaveEdit} className="p-2 bg-green-500 text-white rounded-lg hover:bg-green-600 shadow-sm"><i className="ph ph-check font-bold"></i></button>
                                                                <button onClick={handleCancelEdit} className="p-2 bg-slate-300 text-slate-700 rounded-lg hover:bg-slate-400 shadow-sm"><i className="ph ph-x font-bold"></i></button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                ) : (
                                                    <tr key={row.id} className="hover:bg-slate-50 transition-colors">
                                                        <td className="p-4 pl-6 text-sm text-slate-500 whitespace-nowrap"><i className="ph ph-clock text-sm"></i> {row.timestamp}</td>
                                                        <td className="p-4 font-bold text-slate-800 whitespace-nowrap">{row.name}</td>
                                                        <td className="p-4 text-slate-600 text-sm whitespace-nowrap">{row.phase}</td>
                                                        <td className="p-4 text-center whitespace-nowrap"><span className={`inline-flex items-center justify-center px-3 py-1 rounded-full text-sm font-bold w-16 ${row.score >= 80 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>{row.score}%</span></td>
                                                        <td className="p-4 text-center whitespace-nowrap"><span className={`inline-flex items-center justify-center w-24 py-1.5 rounded-full text-sm font-bold text-white mx-auto shadow-sm ${row.grade === 0 ? 'bg-green-500' : row.grade === 1 ? 'bg-yellow-500 text-yellow-900' : row.grade === 2 ? 'bg-orange-500' : row.grade === 3 ? 'bg-red-500' : 'bg-purple-600'}`}>Grade {row.grade}</span></td>
                                                        <td className="p-4 pr-6 text-center whitespace-nowrap">
                                                            <div className="flex items-center justify-center gap-2">
                                                                <button onClick={() => handleEditRecord(row)} className="w-8 h-8 rounded-full bg-blue-50 text-blue-600 hover:bg-blue-100 flex items-center justify-center transition-colors border border-blue-100" title="แก้ไข">
                                                                    <i className="ph ph-pencil-simple text-lg"></i>
                                                                </button>
                                                                <button onClick={() => handleDeleteRecord(row.id)} className="w-8 h-8 rounded-full bg-red-50 text-red-600 hover:bg-red-100 flex items-center justify-center transition-colors border border-red-100" title="ลบ">
                                                                    <i className="ph ph-trash text-lg"></i>
                                                                </button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                )
                                            )) : <tr><td colSpan="6" className="p-10 text-center text-slate-400">ไม่พบข้อมูลการประเมินในระดับแผลที่เลือก</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            // Main Layout App Execution
            if (!role && step === 'welcome') return renderRoleSelection();
            if (step === 'staff_login') return renderStaffLogin();
            if (role === 'staff') return renderStaffDashboard();

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-800 selection:bg-blue-200 flex flex-col">
                    <header className="bg-white border-b border-slate-200 px-5 py-3 sticky top-0 z-20 flex justify-between items-center shadow-sm shrink-0">
                        <div className="flex items-center gap-2">
                            <i className="ph ph-hospital text-blue-600 text-2xl"></i>
                            <h1 className="font-bold text-slate-800 text-lg tracking-tight truncate max-w-[200px] sm:max-w-none">รพ.พริ้นซ์ศรีสะเกษ</h1>
                        </div>
                        {step !== 'patient_login' && !showResult && (
                            <span className="text-xs sm:text-sm font-medium bg-slate-100 text-slate-600 px-3 py-1.5 rounded-full truncate max-w-[150px] sm:max-w-none border border-slate-200">{patientData.name}</span>
                        )}
                    </header>
                    <main className="flex-1 overflow-y-auto">
                        {step === 'patient_login' && renderPatientLogin()}
                        {step === 'quiz' && renderQuizScreen()}
                        {step === 'symptom' && renderSymptomScreen()}
                        {step === 'result' && renderPatientResultScreen()}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
